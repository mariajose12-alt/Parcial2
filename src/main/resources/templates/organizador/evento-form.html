<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${evento.id != null ? 'Editar Evento' : 'Nuevo Evento'} + ' - Eventos PUCMM'">Evento - Eventos PUCMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar(${usuario})}"></div>

<div class="container mt-4 mb-5">

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">
                        <i class="bi bi-calendar-plus"></i>
                        <span th:text="${evento.id != null ? 'Editar Evento' : 'Nuevo Evento'}"></span>
                    </h4>

                    <form id="eventoForm"
                          th:action="${evento.id != null ? '/organizador/eventos/' + evento.id + '/editar' : '/organizador/eventos/nuevo'}"
                          method="post" class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Título del evento</label>
                            <input type="text" class="form-control" name="titulo"
                                   th:value="${evento != null ? evento.titulo : ''}"
                                   required minlength="3"
                                   placeholder="Ej: Taller de Inteligencia Artificial">
                            <div class="invalid-feedback">El título es requerido (mínimo 3 caracteres).</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="4"
                                      required minlength="10"
                                      placeholder="Describe el evento..."
                                      th:text="${evento != null ? evento.descripcion : ''}"></textarea>
                            <div class="invalid-feedback">La descripción es requerida (mínimo 10 caracteres).</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Fecha y hora</label>
                                <input type="datetime-local" class="form-control" name="fecha" id="fechaInput"
                                       th:value="${evento.fechaParaInput}"
                                       required>
                                <div class="invalid-feedback" id="fechaError">La fecha es requerida.</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Cupo máximo</label>
                                <input type="number" class="form-control" name="capacidadMax"
                                       th:value="${evento != null ? evento.capacidadMax : ''}"
                                       required min="1" max="1000"
                                       placeholder="Ej: 50">
                                <div class="invalid-feedback">Ingresa un cupo válido (mínimo 1).</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Lugar</label>
                            <input type="text" class="form-control" name="lugar"
                                   th:value="${evento != null ? evento.lugar : ''}"
                                   required
                                   placeholder="Ej: Auditorio Principal, Edificio A">
                            <div class="invalid-feedback">El lugar es requerido.</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">
                                <i class="bi bi-save"></i>
                                <span th:text="${evento.id != null ? 'Guardar cambios' : 'Crear evento'}"></span>
                            </button>
                            <a href="/organizador/eventos" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-auto">
    <small>© 2025 PUCMM - Sistema de Gestión de Eventos Académicos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('eventoForm').addEventListener('submit', function (e) {
        const fechaInput = document.getElementById('fechaInput');
        const fechaError = document.getElementById('fechaError');
        const fecha = new Date(fechaInput.value);
        const ahora = new Date();

        if (fechaInput.value && fecha <= ahora) {
            e.preventDefault();
            fechaInput.classList.add('is-invalid');
            fechaError.textContent = 'La fecha debe ser futura.';
        } else {
            fechaInput.classList.remove('is-invalid');
            fechaError.textContent = 'La fecha es requerida.';
        }

        if (!this.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        this.classList.add('was-validated');
    });
</script>
<script src="/js/darkmode.js"></script>
</body>
</html>
