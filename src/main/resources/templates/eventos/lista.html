<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Disponibles - Eventos PUCMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar(${usuario})}"></div>

<div class="container mt-4 mb-5">

    <!-- Toast -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index:9999;">
        <div id="toastFeedback" class="toast align-items-center text-white border-0"
             role="alert">
            <div class="d-flex">
                <div class="toast-body fw-semibold" id="toastMensaje"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-calendar3"></i> Eventos Disponibles
        </h2>
        <div class="btn-group" role="group">
            <button class="btn btn-dark btn-sm active" id="btnVistaTarjetas"
                    onclick="cambiarVista('tarjetas')">
                <i class="bi bi-grid-3x3-gap"></i> Tarjetas
            </button>
            <button class="btn btn-outline-dark btn-sm" id="btnVistaCalendario"
                    onclick="cambiarVista('calendario')">
                <i class="bi bi-calendar-week"></i> Calendario
            </button>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-3">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-semibold small">Buscar</label>
                    <input type="text" class="form-control form-control-sm"
                           id="filtroBusqueda"
                           placeholder="Título o lugar..."
                           oninput="filtrarEventos()">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small">Tipo</label>
                    <select class="form-select form-select-sm" id="filtroTipo"
                            onchange="filtrarEventos()">
                        <option value="">Todos</option>
                        <option value="CHARLA">Charla</option>
                        <option value="TALLER">Taller</option>
                        <option value="SEMINARIO">Seminario</option>
                        <option value="CONGRESO">Congreso</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small">Desde</label>
                    <input type="date" class="form-control form-control-sm"
                           id="filtroDesde" onchange="filtrarEventos()">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small">Hasta</label>
                    <input type="date" class="form-control form-control-sm"
                           id="filtroHasta" onchange="filtrarEventos()">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-secondary btn-sm w-100"
                            onclick="limpiarFiltros()">
                        <i class="bi bi-x-lg"></i> Limpiar filtros
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Vista tarjetas -->
    <div id="vistaTarjetas">
        <div th:if="${not #lists.isEmpty(eventos)}"
             class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
             id="contenedorEventos">
            <div class="col evento-item"
                 th:each="evento : ${eventos}"
                 th:data-titulo="${evento.titulo}"
                 th:data-lugar="${evento.lugar}"
                 th:data-tipo="${evento.tipo.name()}"
                 th:data-fecha="${evento.fechaInicioParaInput}">

                <div class="card evento-card shadow-sm h-100">
                    <div class="card-header bg-dark text-white">
                        <!-- Badge tipo -->
                        <span th:switch="${evento.tipo.name()}">
                            <span th:case="'CHARLA'"
                                  class="badge bg-info text-dark float-end">Charla</span>
                            <span th:case="'TALLER'"
                                  class="badge bg-warning text-dark float-end">Taller</span>
                            <span th:case="'SEMINARIO'"
                                  class="badge bg-primary float-end">Seminario</span>
                            <span th:case="'CONGRESO'"
                                  class="badge bg-secondary float-end">Congreso</span>
                        </span>
                        <h6 class="mb-0 text-truncate"
                            th:text="${evento.titulo}"></h6>
                    </div>
                    <div class="card-body">
                        <p class="text-muted small mb-2">
                            <i class="bi bi-calendar-event"></i>
                            <span th:text="${evento.fechaInicioFormateada}"></span>
                        </p>
                        <p class="text-muted small mb-2"
                           th:if="${evento.fechaFin != null}">
                            <i class="bi bi-calendar-x"></i>
                            Hasta: <span th:text="${evento.fechaFinFormateada}"></span>
                        </p>
                        <p class="text-muted small mb-2">
                            <i class="bi bi-geo-alt"></i>
                            <span th:text="${evento.lugar}"></span>
                        </p>
                        <p class="card-text small"
                           th:text="${#strings.abbreviate(evento.descripcion, 100)}">
                        </p>
                        <div class="mt-3">
                            <div class="d-flex justify-content-between small text-muted mb-1">
                                <span><i class="bi bi-people"></i> Cupo</span>
                                <span>
                                    <span th:text="${evento.inscritosActuales}"></span> /
                                    <span th:text="${evento.capacidadMax}"></span>
                                </span>
                            </div>
                            <div class="progress cupo-bar">
                                <div class="progress-bar bg-dark"
                                     th:style="'width:' + ${evento.capacidadMax > 0
                                         ? (evento.inscritosActuales * 100 / evento.capacidadMax)
                                         : 0} + '%'">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 pb-3">

                        <!-- Administrar (admin u organizador dueño) -->
                        <a th:if="${usuario.rol.name() == 'ADMINISTRADOR'
       or (usuario.rol.name() == 'ORGANIZADOR'
       and evento.organizador.id == usuario.id)}"
                           th:href="'/organizador/eventos/' + ${evento.id}"
                           class="btn btn-warning w-100">
                            <i class="bi bi-gear"></i> Administrar
                        </a>

                        <!-- Todo lo demás: SOLO si NO es admin y NO es el organizador dueño -->
                        <th:block th:if="${usuario.rol.name() != 'ADMINISTRADOR' and not (usuario.rol.name() == 'ORGANIZADOR' and evento.organizador.id == usuario.id)}">
                            <!-- Inscripciones cerradas -->
                            <button th:if="${evento.haTerminado()}"
                                    class="btn btn-secondary w-100" disabled>
                                <i class="bi bi-clock-history"></i> Inscripciones cerradas
                            </button>

                            <!-- Ya inscrito -->
                            <button th:if="${!evento.haTerminado() and evento.usuarioInscrito}" class="btn btn-success w-100" disabled>
                                <i class="bi bi-check-circle"></i> Ya inscrito
                            </button>

                            <!-- Sin cupo -->
                            <button th:if="${!evento.haTerminado() and !evento.usuarioInscrito and evento.inscritosActuales >= evento.capacidadMax}"
                                    class="btn btn-secondary w-100" disabled>
                                <i class="bi bi-x-circle"></i> Sin cupo disponible
                            </button>

                            <!-- Inscribirse -->
                            <button th:if="${!evento.haTerminado() and !evento.usuarioInscrito and evento.inscritosActuales < evento.capacidadMax}"
                                    class="btn btn-dark w-100 btn-inscribir"
                                    th:data-id="${evento.id}">
                                <i class="bi bi-plus-circle"></i> Inscribirse
                            </button>

                        </th:block>

                    </div>
                </div>
            </div>
        </div>

        <div id="sinResultados" class="text-center py-5" style="display:none;">
            <i class="bi bi-search fs-1 text-muted"></i>
            <p class="text-muted mt-3">
                No se encontraron eventos con esos filtros.
            </p>
        </div>

        <div th:if="${#lists.isEmpty(eventos)}" class="text-center py-5">
            <i class="bi bi-calendar-x fs-1 text-muted"></i>
            <p class="text-muted mt-3">
                No hay eventos disponibles en este momento.
            </p>
        </div>
    </div>

    <!-- Vista calendario -->
    <div id="vistaCalendario" style="display:none;">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div id="calendario"></div>
            </div>
        </div>
    </div>

    <!-- Modal detalle desde calendario -->
    <div class="modal fade" id="modalEvento" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitulo"></h5>
                    <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><i class="bi bi-geo-alt"></i> <span id="modalLugar"></span></p>
                    <p>
                        <i class="bi bi-calendar-check"></i> Inicio:
                        <span id="modalFechaInicio"></span>
                    </p>
                    <p>
                        <i class="bi bi-calendar-x"></i> Fin:
                        <span id="modalFechaFin"></span>
                    </p>
                    <p>
                        <i class="bi bi-text-paragraph"></i>
                        <span id="modalDescripcion"></span>
                    </p>
                    <p>
                        <i class="bi bi-people"></i> Cupo:
                        <span id="modalCupo"></span>
                    </p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm"
                            data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-dark btn-sm"
                            id="modalBtnInscribir">
                        <i class="bi bi-plus-circle"></i> Inscribirse
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="/js/darkmode.js"></script>
<script th:inline="javascript">
    const eventosCalendario = [
        /*[# th:each="e : ${eventos}"]*/
        {
            id:    /*[[${e.id}]]*/ 0,
            title: /*[[${e.titulo}]]*/ '',
            start: /*[[${e.fechaInicioParaInput}]]*/ '',
            end:   /*[[${e.fechaFinParaInput}]]*/ '',
            extendedProps: {
                lugar:             /*[[${e.lugar}]]*/ '',
                descripcion:       /*[[${e.descripcion}]]*/ '',
                inscritosActuales: /*[[${e.inscritosActuales}]]*/ 0,
                capacidadMax:      /*[[${e.capacidadMax}]]*/ 0,
                terminado:         /*[[${e.haTerminado()}]]*/ false
            }
        },
        /*[/]*/
    ];

    let calendario = null;

    function cambiarVista(vista) {
        const tarjetas    = document.getElementById('vistaTarjetas');
        const cal         = document.getElementById('vistaCalendario');
        const btnTarjetas = document.getElementById('btnVistaTarjetas');
        const btnCal      = document.getElementById('btnVistaCalendario');

        if (vista === 'tarjetas') {
            tarjetas.style.display = '';
            cal.style.display      = 'none';
            btnTarjetas.classList.add('active');
            btnTarjetas.classList.replace('btn-outline-dark', 'btn-dark');
            btnCal.classList.remove('active');
            btnCal.classList.replace('btn-dark', 'btn-outline-dark');
            localStorage.setItem('vistaEventos', 'tarjetas');
        } else {
            tarjetas.style.display = 'none';
            cal.style.display      = '';
            btnTarjetas.classList.remove('active');
            btnTarjetas.classList.replace('btn-dark', 'btn-outline-dark');
            btnCal.classList.add('active');
            btnCal.classList.replace('btn-outline-dark', 'btn-dark');
            localStorage.setItem('vistaEventos', 'calendario');

            if (!calendario) {
                calendario = new FullCalendar.Calendar(
                    document.getElementById('calendario'), {
                        initialView:   'dayGridMonth',
                        locale:        'es',
                        headerToolbar: {
                            left:   'prev,next today',
                            center: 'title',
                            right:  'dayGridMonth,timeGridWeek,listWeek'
                        },
                        events:     eventosCalendario,
                        eventColor: '#212529',
                        eventClick: function(info) {
                            const props = info.event.extendedProps;
                            document.getElementById('modalTitulo').textContent =
                                info.event.title;
                            document.getElementById('modalLugar').textContent =
                                props.lugar;
                            document.getElementById('modalFechaInicio').textContent =
                                info.event.start
                                    ? info.event.start.toLocaleString('es-DO') : '—';
                            document.getElementById('modalFechaFin').textContent =
                                info.event.end
                                    ? info.event.end.toLocaleString('es-DO') : '—';
                            document.getElementById('modalDescripcion').textContent =
                                props.descripcion;
                            document.getElementById('modalCupo').textContent =
                                props.inscritosActuales + ' / ' + props.capacidadMax;

                            const btnInscribir =
                                document.getElementById('modalBtnInscribir');
                            const esParticipante =
                                /*[[${usuario.rol.name() == 'PARTICIPANTE'}]]*/ false;

                            if (esParticipante
                                && !props.terminado
                                && props.inscritosActuales < props.capacidadMax) {
                                btnInscribir.style.display = '';
                                btnInscribir.onclick = () => {
                                    inscribirse(info.event.id, btnInscribir);
                                    bootstrap.Modal.getInstance(
                                        document.getElementById('modalEvento')
                                    ).hide();
                                };
                            } else {
                                btnInscribir.style.display = 'none';
                            }

                            new bootstrap.Modal(
                                document.getElementById('modalEvento')
                            ).show();
                        }
                    });
                calendario.render();
            }
        }
    }

    function filtrarEventos() {
        const busqueda = document.getElementById('filtroBusqueda').value.toLowerCase();
        const tipo     = document.getElementById('filtroTipo').value;
        const desde    = document.getElementById('filtroDesde').value;
        const hasta    = document.getElementById('filtroHasta').value;

        const items = document.querySelectorAll('.evento-item');
        let visibles = 0;

        items.forEach(item => {
            const coincideBusqueda = !busqueda
                || item.dataset.titulo.toLowerCase().includes(busqueda)
                || item.dataset.lugar.toLowerCase().includes(busqueda);
            const coincideTipo  = !tipo  || item.dataset.tipo  === tipo;
            const coincideDesde = !desde || item.dataset.fecha >= desde;
            const coincideHasta = !hasta || item.dataset.fecha <= hasta;

            const visible = coincideBusqueda && coincideTipo
                && coincideDesde && coincideHasta;
            item.style.display = visible ? '' : 'none';
            if (visible) visibles++;
        });

        document.getElementById('sinResultados').style.display =
            visibles === 0 ? 'block' : 'none';
    }

    function limpiarFiltros() {
        document.getElementById('filtroBusqueda').value = '';
        document.getElementById('filtroTipo').value     = '';
        document.getElementById('filtroDesde').value    = '';
        document.getElementById('filtroHasta').value    = '';
        filtrarEventos();
    }

    function mostrarToast(mensaje, exito) {
        const toast = document.getElementById('toastFeedback');
        toast.classList.remove('bg-success', 'bg-danger');
        toast.classList.add(exito ? 'bg-success' : 'bg-danger');
        document.getElementById('toastMensaje').textContent = mensaje;
        new bootstrap.Toast(toast, { delay: 3500 }).show();
    }

    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.btn-inscribir');
        if (!btn) return;
        inscribirse(btn.dataset.id, btn);
    });

    function inscribirse(eventoId, btn) {
        btn.disabled = true;
        btn.innerHTML =
            '<span class="spinner-border spinner-border-sm me-1"></span> Procesando...';
        fetch('/api/eventos/' + eventoId + '/inscribir', {
            method: 'POST',
            credentials: 'same-origin'
        })
            .then(async res => {
                const data = await res.json();
                if (res.ok) {
                    mostrarToast(data.mensaje || '¡Inscripción exitosa!', true);
                    const footer = btn.closest('.card-footer');
                    if (footer) {
                        footer.innerHTML =
                            '<button class="btn btn-outline-success w-100" disabled>' +
                            '<i class="bi bi-check-circle"></i> Inscrito</button>';
                    }
                } else {
                    mostrarToast(data.error || 'Error al inscribirse', false);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-plus-circle"></i> Inscribirse';
                }
            })
            .catch(() => {
                mostrarToast('Error de conexión', false);
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-plus-circle"></i> Inscribirse';
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const vistaGuardada = localStorage.getItem('vistaEventos');
        if (vistaGuardada === 'calendario') cambiarVista('calendario');
    });
</script>
</body>
</html>
