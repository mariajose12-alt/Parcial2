<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Eventos PUCMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar(${usuario})}"></div>

<div class="container mt-4 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-people"></i> Gestión de Usuarios</h2>
    </div>

    <!-- Filtros -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-3">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Filtrar por rol</label>
                    <select class="form-select form-select-sm" id="filtroRol" onchange="filtrarUsuarios()">
                        <option value="">Todos los roles</option>
                        <option value="ADMINISTRADOR">Administrador</option>
                        <option value="ORGANIZADOR">Organizador</option>
                        <option value="PARTICIPANTE">Participante</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold small">Buscar por nombre o email</label>
                    <input type="text" class="form-control form-control-sm" id="filtroBusqueda"
                           placeholder="Escribe para buscar..." oninput="filtrarUsuarios()">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small">Estado</label>
                    <select class="form-select form-select-sm" id="filtroEstado" onchange="filtrarUsuarios()">
                        <option value="">Todos</option>
                        <option value="activo">Activo</option>
                        <option value="bloqueado">Bloqueado</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="limpiarFiltros()">
                        <i class="bi bi-x-lg"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="tablaUsuarios">
                    <thead>
                    <tr>
                        <th class="ps-4">Usuario</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th class="pe-4">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}"
                        data-paginar="true"
                        th:data-rol="${u.rol.name()}"
                        th:data-nombre="${u.nombre + ' ' + u.apellido}"
                        th:data-email="${u.email}"
                        th:data-estado="${u.activo ? 'activo' : 'bloqueado'}">
                        <td class="ps-4 fw-semibold">
                            <i class="bi bi-person-circle text-muted me-2"></i>
                            <span th:text="${u.nombre + ' ' + u.apellido}"></span>
                        </td>
                        <td class="text-muted" th:text="${u.email}"></td>
                        <td>
                            <span th:switch="${u.rol.name()}">
                                <span th:case="'ADMINISTRADOR'" class="badge bg-dark">
                                    <i class="bi bi-shield-lock"></i> Administrador
                                </span>
                                <span th:case="'ORGANIZADOR'" class="badge bg-primary">
                                    <i class="bi bi-gear"></i> Organizador
                                </span>
                                <span th:case="'PARTICIPANTE'" class="badge bg-secondary">
                                    <i class="bi bi-person"></i> Participante
                                </span>
                            </span>
                        </td>
                        <td>
                            <span th:if="${u.activo}" class="badge bg-success">Activo</span>
                            <span th:unless="${u.activo}" class="badge bg-danger">Bloqueado</span>
                        </td>
                        <td class="pe-4">
                            <span th:if="${u.rol.name() == 'ADMINISTRADOR'}" class="text-muted small">
                                <i class="bi bi-lock-fill"></i> Protegido
                            </span>
                            <div th:unless="${u.rol.name() == 'ADMINISTRADOR'}" class="d-flex flex-wrap gap-2">
                                <form th:if="${u.rol.name() == 'PARTICIPANTE'}"
                                      th:action="'/admin/usuarios/' + ${u.id} + '/organizador'"
                                      method="post" class="d-inline">
                                    <button class="btn btn-outline-primary btn-sm">
                                        <i class="bi bi-arrow-up-circle"></i> Organizador
                                    </button>
                                </form>
                                <form th:if="${u.rol.name() == 'ORGANIZADOR'}"
                                      th:action="'/admin/usuarios/' + ${u.id} + '/revocar'"
                                      method="post" class="d-inline">
                                    <button class="btn btn-outline-secondary btn-sm">
                                        <i class="bi bi-arrow-down-circle"></i> Revocar
                                    </button>
                                </form>
                                <form th:if="${u.activo}"
                                      th:action="'/admin/usuarios/' + ${u.id} + '/bloquear'"
                                      method="post" class="d-inline confirm-form"
                                      th:data-mensaje="'¿Bloquear a ' + ${u.nombre} + '?'">
                                    <button class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-lock"></i> Bloquear
                                    </button>
                                </form>
                                <form th:unless="${u.activo}"
                                      th:action="'/admin/usuarios/' + ${u.id} + '/desbloquear'"
                                      method="post" class="d-inline">
                                    <button class="btn btn-outline-success btn-sm">
                                        <i class="bi bi-unlock"></i> Desbloquear
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="5" class="text-center text-muted py-4">No hay usuarios registrados.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-auto">
    <small>© 2025 PUCMM - Sistema de Gestión de Eventos Académicos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/paginacion.js"></script>
<script src="/js/darkmode.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {

        inicializarPaginacion('tablaUsuarios', 7);

        let formToSubmit = null;

        document.querySelectorAll('.confirm-form').forEach(form => {
            form.addEventListener('submit', function (e) {

                e.preventDefault();

                formToSubmit = this;

                const msg = this.dataset.mensaje || '¿Confirmar acción?';
                document.getElementById('confirmModalText').innerText = msg;

                const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
                modal.show();
            });
        });

        document.getElementById('confirmModalBtn').addEventListener('click', () => {
            if (formToSubmit) {
                formToSubmit.submit();
            }
        });

    });

    function filtrarUsuarios() {
        const rol = document.getElementById('filtroRol').value.toLowerCase();
        const busqueda = document.getElementById('filtroBusqueda').value.toLowerCase();
        const estado = document.getElementById('filtroEstado').value.toLowerCase();

        document.querySelectorAll('#tablaUsuarios tbody tr[data-rol]').forEach(fila => {
            const filRol = fila.dataset.rol.toLowerCase();
            const filNombre = fila.dataset.nombre.toLowerCase();
            const filEmail = fila.dataset.email.toLowerCase();
            const filEstado = fila.dataset.estado.toLowerCase();

            const coincideRol = !rol || filRol === rol;
            const coincideBusqueda = !busqueda || filNombre.includes(busqueda) || filEmail.includes(busqueda);
            const coincideEstado = !estado || filEstado === estado;

            const visible = coincideRol && coincideBusqueda && coincideEstado;
            fila.style.display = visible ? '' : 'none';
            if (visible) {
                fila.setAttribute('data-paginar', 'true');
            } else {
                fila.removeAttribute('data-paginar');
            }
        });

        reiniciarPaginacion('tablaUsuarios', 7);
    }

    function limpiarFiltros() {
        document.getElementById('filtroRol').value = '';
        document.getElementById('filtroBusqueda').value = '';
        document.getElementById('filtroEstado').value = '';
        filtrarUsuarios();
    }
</script>
<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-exclamation-triangle text-warning"></i>
                    Confirmar acción
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="confirmModalText">
                ¿Confirmar acción?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="button" class="btn btn-danger" id="confirmModalBtn">
                    Confirmar
                </button>
            </div>

        </div>
    </div>
</div>
</body>
</html>
