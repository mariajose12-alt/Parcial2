<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos los Eventos - Eventos PUCMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar(${usuario})}"></div>

<div class="container mt-4 mb-5">

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-gear"></i> Todos los Eventos</h2>
        <a href="/organizador/eventos/nuevo" class="btn btn-dark">
            <i class="bi bi-plus-lg"></i> Nuevo Evento
        </a>
    </div>

    <!-- Filtros -->
    <div class="card shadow-sm border-0 mb-3" id="filtrosCard">
        <div class="card-body py-3">
            <div class="row g-2 align-items-end"> <!-- Búsqueda libre -->
                <div class="col-12 col-md-4"><label class="form-label fw-semibold small text-muted mb-1"> <i
                        class="bi bi-search"></i> Buscar </label> <input type="text" id="filtroBusqueda"
                                                                         class="form-control form-control-sm"
                                                                         placeholder="Título o lugar…"></div>
                <!-- Tipo -->
                <div class="col-6 col-md-2"><label class="form-label fw-semibold small text-muted mb-1"> <i
                        class="bi bi-tag"></i> Tipo </label>
                    <select id="filtroTipo" class="form-select form-select-sm">
                    <option value="">Todos</option>
                    <option value="CHARLA">Charla</option>
                    <option value="TALLER">Taller</option>
                    <option value="SEMINARIO">Seminario</option>
                    <option value="CONGRESO">Congreso</option>
                </select></div> <!-- Estado -->
                <div class="col-6 col-md-2"><label class="form-label fw-semibold small text-muted mb-1"> <i
                        class="bi bi-circle-half"></i> Estado </label> <select id="filtroEstado"
                                                                               class="form-select form-select-sm">
                    <option value="">Todos</option>
                    <option value="PUBLICADO">Publicado</option>
                    <option value="BORRADOR">Borrador</option>
                    <option value="CANCELADO">Cancelado</option>
                </select></div> <!-- Desde -->
                <div class="col-6 col-md-2"><label class="form-label fw-semibold small text-muted mb-1"> <i
                        class="bi bi-calendar-event"></i> Desde </label> <input type="date" id="filtroDesde"
                                                                                class="form-control form-control-sm">
                </div> <!-- Hasta -->
                <div class="col-6 col-md-2"><label class="form-label fw-semibold small text-muted mb-1"> <i
                        class="bi bi-calendar-check"></i> Hasta </label> <input type="date" id="filtroHasta"
                                                                                class="form-control form-control-sm">
                </div>
            </div> <!-- Conteo + limpiar -->
            <div class="d-flex justify-content-between align-items-center mt-2"><small class="text-muted"> Mostrando
                <span id="conteoFiltrados" class="fw-semibold text-dark">–</span> de <span id="conteoTotal"
                                                                                           class="fw-semibold text-dark">–</span>
                evento(s) </small>
                <button id="btnLimpiarFiltros" class="btn btn-link btn-sm text-secondary p-0" style="display:none"><i
                        class="bi bi-x-circle"></i> Limpiar filtros
                </button>
            </div>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(eventos)}" class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="tablaEventosOrg">
                    <thead>
                    <tr>
                        <th class="ps-4">Título</th>
                        <th>Fecha</th>
                        <th>Lugar</th>
                        <th>Cupo</th>
                        <th>Estado</th>
                        <th class="pe-4">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="evento : ${eventos}" data-paginar="true"
                        th:data-titulo="${evento.titulo}"
                        th:data-lugar="${evento.lugar}"
                        th:data-tipo="${evento.tipo.name()}"
                        th:data-estado="${evento.estado.name()}"
                        th:data-fecha="${#temporals.format(evento.fechaInicio,'yyyy-MM-dd')}">


                        <td class="ps-4" data-label="Titulo">
                            <a th:href="'/organizador/eventos/' + ${evento.id}"
                               class="fw-semibold text-decoration-none"
                               th:text="${evento.titulo}">
                            </a>
                        </td>
                        <td data-label="Inicio"
                            th:text="${#temporals.format(evento.fechaInicio, 'dd MMM yyyy, HH:mm')}"></td>
                        <td data-label="Lugar" th:text="${evento.lugar}"></td>
                        <td data-label="Cupo">
                            <span th:text="${evento.inscritosActuales}"></span> /
                            <span th:text="${evento.capacidadMax}"></span>
                        </td>
                        <td data-label="Estado">
                            <span th:switch="${evento.estado.name()}">
                                <span th:case="'PUBLICADO'" class="badge bg-success">Publicado</span>
                                <span th:case="'BORRADOR'" class="badge bg-secondary">Borrador</span>
                                <span th:case="'CANCELADO'" class="badge bg-danger">Cancelado</span>
                            </span>
                        </td>
                        <td class="pe-4" data-label="Acciones">
                            <div class="d-flex align-items-center gap-2">
                                <!-- Grupo principal -->
                                <div class="btn-group btn-group-sm">
                                    <a th:href="'/organizador/eventos/' + ${evento.id} + '/editar'"
                                       class="btn btn-outline-dark" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="'/organizador/eventos/' + ${evento.id} + '/resumen'"
                                       class="btn btn-outline-primary" title="Resumen">
                                        <i class="bi bi-bar-chart"></i>
                                    </a>
                                    <!-- Escáner QR — solo activo si estaEnCurso() -->
                                    <a th:if="${evento.estaEnCurso()}"
                                       th:href="'/organizador/eventos/' + ${evento.id} + '/scanner'"
                                       class="btn btn-outline-success"
                                       title="Escáner QR">
                                        <i class="bi bi-qr-code-scan"></i>
                                    </a>
                                    <button th:unless="${evento.estaEnCurso()}"
                                            class="btn btn-outline-secondary"
                                            disabled
                                            th:title="${'Escáner disponible: '
                                                + evento.getRangoFechasFormateado()}">
                                        <i class="bi bi-qr-code-scan"></i>
                                    </button>
                                </div>

                                <!-- Separados -->
                                <form th:if="${evento.estado.name() == 'BORRADOR'}"
                                      th:action="'/organizador/eventos/' + ${evento.id} + '/publicar'"
                                      method="post" class="d-inline">
                                    <button class="btn btn-outline-success btn-sm" title="Publicar">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </form>
                                <form th:if="${evento.estado.name() == 'PUBLICADO'}"
                                      th:action="'/organizador/eventos/' + ${evento.id} + '/despublicar'"
                                      method="post" class="d-inline">
                                    <button class="btn btn-outline-warning btn-sm" title="Despublicar">
                                        <i class="bi bi-eye-slash"></i>
                                    </button>
                                </form>
                                <form th:action="'/organizador/eventos/' + ${evento.id} + '/cancelar'"
                                      method="post">

                                    <!-- Se puede cancelar -->
                                    <button type="button"
                                            th:if="${!evento.estaEnCurso() and !evento.haTerminado()}"
                                            class="btn btn-outline-danger btn-sm"
                                            title="Cancelar evento"
                                            th:data-confirm="'¿Cancelar el evento ' + ${evento.titulo} + '?'">
                                        <i class="bi bi-x-lg"></i>
                                    </button>

                                    <!-- No se puede cancelar -->
                                    <button th:unless="${!evento.estaEnCurso() and !evento.haTerminado() and evento.estado.name() != 'CANCELADO'}"
                                            class="btn btn-outline-secondary btn-sm"
                                            disabled
                                            title="No se puede cancelar un evento en curso o finalizado">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(eventos)}" class="text-center py-5">
        <i class="bi bi-calendar-plus fs-1 text-muted"></i>
        <p class="text-muted mt-3">No has creado ningún evento aún.</p>
        <a href="/organizador/eventos/nuevo" class="btn btn-dark mt-2">
            <i class="bi bi-plus-lg"></i> Crear primer evento
        </a>
    </div>

</div>
<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Confirmar acción</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="confirmMessage">
                ¿Estás seguro?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-danger" id="confirmAccept">Aceptar</button>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/paginacion.js"></script>
<script src="/js/darkmode.js"></script>
<script src="/js/confirmaciones.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {

        inicializarPaginacion('tablaEventosOrg', 7);

        const $ = id => document.getElementById(id);

        const tabla       = $('tablaEventosOrg');
        const filBusqueda = $('filtroBusqueda');
        const filTipo     = $('filtroTipo');
        const filEstado   = $('filtroEstado');
        const filDesde    = $('filtroDesde');
        const filHasta    = $('filtroHasta');
        const btnLimpiar  = $('btnLimpiarFiltros');
        const spanFilt    = $('conteoFiltrados');
        const spanTotal   = $('conteoTotal');

        if (!tabla) return;

        const filas = [...tabla.querySelectorAll('tbody tr[data-paginar]')];

        spanTotal.textContent = filas.length;

        function filtrar() {

            const busq   = filBusqueda.value.toLowerCase().trim();
            const tipo   = filTipo.value.toUpperCase();
            const estado = filEstado.value.toUpperCase();
            const desde  = filDesde.value ? new Date(filDesde.value) : null;
            const hasta  = filHasta.value ? new Date(filHasta.value) : null;

            if (hasta) hasta.setHours(23,59,59);

            let visibles = 0;

            filas.forEach(fila => {

                const titulo = fila.dataset.titulo.toLowerCase();
                const lugar  = fila.dataset.lugar.toLowerCase();
                const tipoEv = fila.dataset.tipo;
                const estadoEv = fila.dataset.estado;
                const fechaEv  = new Date(fila.dataset.fecha);

                let ok = true;

                if (busq && !titulo.includes(busq) && !lugar.includes(busq))
                    ok = false;

                if (tipo && tipoEv !== tipo)
                    ok = false;

                if (estado && estadoEv !== estado)
                    ok = false;

                if (desde && fechaEv < desde)
                    ok = false;

                if (hasta && fechaEv > hasta)
                    ok = false;

                fila.style.display = ok ? '' : 'none';

                if (ok) visibles++;

            });

            spanFilt.textContent = visibles;

            const hayFiltro = busq || tipo || estado || filDesde.value || filHasta.value;

            btnLimpiar.style.display = hayFiltro ? '' : 'none';

            reiniciarPaginacion('tablaEventosOrg', 7);
        }

        btnLimpiar.addEventListener('click', () => {

            filBusqueda.value = '';
            filTipo.value = '';
            filEstado.value = '';
            filDesde.value = '';
            filHasta.value = '';

            filtrar();
        });

        [filBusqueda, filTipo, filEstado, filDesde, filHasta]
            .forEach(el => el.addEventListener('input', filtrar));

        filtrar();
    });
</script>
</body>
</html>
