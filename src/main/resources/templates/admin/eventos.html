<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos los Eventos - Eventos PUCMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar(${usuario})}"></div>

<div class="container mt-4 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-calendar-check"></i> Todos los Eventos</h2>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="tablaEventosAdmin">
                    <thead>
                    <tr>
                        <th class="ps-4">Título</th>
                        <th>Organizador</th>
                        <th>Fecha</th>
                        <th>Cupo</th>
                        <th>Estado</th>
                        <th class="pe-4">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="evento : ${eventos}" data-paginar="true">
                        <td class="ps-4 fw-semibold" th:text="${evento.titulo}"></td>
                        <td class="text-muted">
                            <span th:text="${evento.organizador.nombre + ' ' + evento.organizador.apellido}"></span>
                        </td>
                        <td th:text="${#temporals.format(evento.fecha, 'dd MMM yyyy, HH:mm')}"></td>
                        <td>
                            <span th:text="${evento.inscritosActuales}"></span> /
                            <span th:text="${evento.capacidadMax}"></span>
                        </td>
                        <td>
                            <span th:switch="${evento.estado.name()}">
                                <span th:case="'PUBLICADO'" class="badge bg-success">Publicado</span>
                                <span th:case="'BORRADOR'" class="badge bg-secondary">Borrador</span>
                                <span th:case="'CANCELADO'" class="badge bg-danger">Cancelado</span>
                            </span>
                        </td>
                        <td class="pe-4">
                            <form th:action="'/admin/eventos/' + ${evento.id} + '/eliminar'"
                                  method="post" class="d-inline confirm-form"
                                  th:data-mensaje="'¿Eliminar ' + ${evento.titulo} + '? Esta acción no se puede deshacer.'">
                                <button class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i> Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(eventos)}">
                        <td colspan="6" class="text-center text-muted py-4">No hay eventos registrados.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-auto">
    <small>© 2026 PUCMM - Sistema de Gestión de Eventos Académicos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/paginacion.js"></script>
<script src="/js/darkmode.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        inicializarPaginacion('tablaEventosAdmin', 7);
    });

    document.querySelectorAll('.confirm-form').forEach(form => {
        form.addEventListener('submit', function (e) {
            const msg = this.dataset.mensaje || '¿Confirmar acción?';
            if (!confirm(msg)) e.preventDefault();
        });
    });
</script>
</body>
</html>
