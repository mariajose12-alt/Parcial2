<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Eventos PUCMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar(${usuario})}"></div>

<div class="container mt-4 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-bar-chart-line"></i> Dashboard
            <span class="text-muted fs-5 fw-normal ms-2"
                  th:text="${usuario.rol.name() == 'ADMINISTRADOR'} ? 'General' : 'Mis Eventos'">
            </span>
        </h2>
    </div>

    <!-- Filtros -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-3">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-semibold small">Evento</label>
                    <select class="form-select form-select-sm" id="filtroEvento">
                        <option value="">Todos los eventos</option>
                        <option th:each="evento : ${eventos}"
                                th:value="${evento.id}"
                                th:text="${evento.titulo}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small">Desde</label>
                    <input type="date" class="form-control form-control-sm" id="filtroDesde">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small">Hasta</label>
                    <input type="date" class="form-control form-control-sm" id="filtroHasta">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small">Estado</label>
                    <select class="form-select form-select-sm" id="filtroTipo">
                        <option value="">Todos</option>
                        <option value="PUBLICADO">Publicado</option>
                        <option value="BORRADOR">Borrador</option>
                        <option value="CANCELADO">Cancelado</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button class="btn btn-dark btn-sm w-100" onclick="aplicarFiltros()">
                        <i class="bi bi-funnel"></i> Filtrar
                    </button>
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="limpiarFiltros()">
                        <i class="bi bi-x-lg"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tarjetas de estadísticas -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card inscritos shadow-sm border-0 h-100">
                <div class="card-body text-center py-4">
                    <i class="bi bi-people fs-2 text-primary mb-2"></i>
                    <div class="stat-number text-primary" id="totalInscritos">--</div>
                    <p class="text-muted mb-0 mt-1">Total Inscritos</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card asistentes shadow-sm border-0 h-100">
                <div class="card-body text-center py-4">
                    <i class="bi bi-person-check fs-2 text-success mb-2"></i>
                    <div class="stat-number text-success" id="totalAsistentes">--</div>
                    <p class="text-muted mb-0 mt-1">Total Asistentes</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card porcentaje shadow-sm border-0 h-100">
                <div class="card-body text-center py-4">
                    <i class="bi bi-percent fs-2 text-warning mb-2"></i>
                    <div class="stat-number text-warning" id="porcentajeAsistencia">--</div>
                    <p class="text-muted mb-0 mt-1">Porcentaje Asistencia</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Gráficos -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="fw-bold mb-3">
                        <i class="bi bi-bar-chart"></i> Inscritos por Evento
                    </h6>
                    <canvas id="graficoEventos"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6 class="fw-bold mb-3">
                        <i class="bi bi-graph-up"></i> Inscripciones por Día
                    </h6>
                    <canvas id="graficoDias"></canvas>
                </div>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-light text-center py-3 mt-auto">
    <small>© 2025 PUCMM - Sistema de Gestión de Eventos Académicos</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let graficoEventos = null;
    let graficoDias = null;

    function aplicarFiltros() {
        const eventoId = document.getElementById('filtroEvento').value;
        const desde = document.getElementById('filtroDesde').value;
        const hasta = document.getElementById('filtroHasta').value;
        const tipo = document.getElementById('filtroTipo').value;

        const params = new URLSearchParams();
        if (eventoId) params.append('eventoId', eventoId);
        if (desde) params.append('desde', desde);
        if (hasta) params.append('hasta', hasta);
        if (tipo) params.append('tipo', tipo);

        fetch('/api/dashboard/estadisticas?' + params.toString())
            .then(res => res.json())
            .then(data => renderizarDashboard(data))
            .catch(err => console.error('Error cargando estadísticas:', err));
    }

    function limpiarFiltros() {
        document.getElementById('filtroEvento').value = '';
        document.getElementById('filtroDesde').value = '';
        document.getElementById('filtroHasta').value = '';
        document.getElementById('filtroTipo').value = '';
        aplicarFiltros();
    }

    function renderizarDashboard(data) {
        // Tarjetas
        document.getElementById('totalInscritos').textContent = data.totalInscritos;
        document.getElementById('totalAsistentes').textContent = data.totalAsistentes;
        document.getElementById('porcentajeAsistencia').textContent = data.porcentajeAsistencia + '%';

        // Gráfico inscritos por evento
        const ctxEventos = document.getElementById('graficoEventos').getContext('2d');
        if (graficoEventos) graficoEventos.destroy();
        graficoEventos = new Chart(ctxEventos, {
            type: 'bar',
            data: {
                labels: Object.keys(data.inscritosPorEvento),
                datasets: [{
                    label: 'Inscritos',
                    data: Object.values(data.inscritosPorEvento),
                    backgroundColor: 'rgba(13, 110, 253, 0.7)',
                    borderColor: 'rgba(13, 110, 253, 1)',
                    borderWidth: 1,
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });

        // Gráfico inscripciones por día
        const ctxDias = document.getElementById('graficoDias').getContext('2d');
        if (graficoDias) graficoDias.destroy();
        graficoDias = new Chart(ctxDias, {
            type: 'line',
            data: {
                labels: Object.keys(data.inscritosPorDia),
                datasets: [{
                    label: 'Inscripciones',
                    data: Object.values(data.inscritosPorDia),
                    backgroundColor: 'rgba(25, 135, 84, 0.2)',
                    borderColor: 'rgba(25, 135, 84, 1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: 'rgba(25, 135, 84, 1)'
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    // Cargar estadísticas al entrar
    document.addEventListener('DOMContentLoaded', () => aplicarFiltros());
</script>
<script src="/js/darkmode.js"></script>
</body>
</html>
